version: '3.8'
services:
  app:
    build: .
    ports:
      - "3333:3333"
    environment:
      - PORT=3333
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=800
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 1024M
        reservations:
          cpus: '0.2'
          memory: 256M
    volumes:
      - ./data:/app/data
    restart: always
